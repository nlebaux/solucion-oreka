[build]
  publish = "."

[[redirects]]
  from = "/privado"
  to = "/_privado/"
  status = 200

[[redirects]]
  from = "/privado/*"
  to = "/_privado/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_privado/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "private, no-store, max-age=0"

[[headers]]
  for = "/_privado/entregables/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
